<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Energy System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- MACHINE SELECTION SCREEN -->
  <section id="selectionScreen" class="screen active">
    <h1>Select Machine</h1>

    <div class="machine-grid">

      <div class="machine-card" onclick="openMachine('CNC Machine')">
        <img src="https://cdn-icons-png.flaticon.com/512/2942/2942925.png">
        <h3>CNC Machine</h3>
      </div>

      <div class="machine-card" onclick="openMachine('Conveyor Belt')">
        <img src="https://cdn-icons-png.flaticon.com/512/2897/2897765.png">
        <h3>Conveyor Belt</h3>
      </div>

      <div class="machine-card" onclick="openMachine('Air Compressor')">
        <img src="https://cdn-icons-png.flaticon.com/512/2942/2942920.png">
        <h3>Air Compressor</h3>
      </div>

      <div class="machine-card" onclick="openMachine('Industrial Furnace')">
        <img src="https://cdn-icons-png.flaticon.com/512/1585/1585356.png">
        <h3>Industrial Furnace</h3>
      </div>

      <div class="machine-card" onclick="openMachine('Packaging Unit')">
        <img src="https://cdn-icons-png.flaticon.com/512/3082/3082033.png">
        <h3>Packaging Unit</h3>
      </div>

    </div>
  </section>

  <!-- LIVE MACHINE SCREEN -->
<section id="machineScreen" class="screen">

  <button onclick="goBack()" class="back-btn">← Back</button>
<div class="machine-topbar">

  <h2 id="machineDisplayName"></h2>

  <div style="position: relative;">
    <span style="font-size:22px; cursor:pointer;" onclick="toggleMenu()">⋮</span>

    <div id="dropdownMenu" style="display:none; position:absolute; right:0; background:#1f2937; padding:5px; border-radius:6px;">
      <p onclick="enableEdit()" style="cursor:pointer; margin:5px 10px;">Edit</p>
    </div>
  </div>

</div>

<div id="editPanel" style="display:none; margin:15px 0;">
  <input type="text" id="machineNameInput" placeholder="Enter machine name">
  <input type="file" id="imageInput" accept="image/*">
  <button onclick="saveChanges()">Save</button>
</div>

<div style="margin-bottom:20px;">
  <img id="machineImage" src="https://cdn-icons-png.flaticon.com/512/2942/2942925.png" width="120">
</div>

  <div class="dashboard-grid">

    <div class="dashboard-card">
      <h4>Load</h4>
      <p id="loadValue">0%</p>
    </div>

    <div class="dashboard-card">
      <h4>Efficiency</h4>
      <p id="effValue">0%</p>
    </div>

    <div class="dashboard-card">
      <h4>Energy</h4>
      <p id="energyValue">0 kW</p>
    </div>

    <div class="dashboard-card">
      <h4>Condition</h4>
      <p id="conditionValue">NORMAL</p>
    </div>

  </div>

</section>
  <script src="main.js"></script>
</body>
</html
